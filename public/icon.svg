<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients pour un rendu premium -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111820" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27C694" />
      <stop offset="100%" stop-color="#1D9E75" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fond avec bordure discrète -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#1E2A3A" stroke-width="8"/>
  
  <!-- Cercle radar en arrière-plan (esthétique médicale technologique) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1D9E75" stroke-width="3" stroke-dasharray="12, 12" opacity="0.3"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6, 6" opacity="0.2"/>

  <!-- Tracé du stéthoscope formant un "M" et "S" stylisés -->
  <g filter="url(#glow)">
    <!-- Arc extérieur du stéthoscope -->
    <path d="M160 190 V270 C160 320 200 360 250 360 H262 C312 360 352 320 352 270 V190" fill="none" stroke="url(#brandGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Écouteurs en haut -->
    <path d="M140 190 H180" fill="none" stroke="#27C694" stroke-width="20" stroke-linecap="round"/>
    <path d="M332 190 H372" fill="none" stroke="#27C694" stroke-width="20" stroke-linecap="round"/>

    <!-- Lettres MS intégrées au centre -->
    <text x="256" y="270" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="#E8EDF3" text-anchor="middle" letter-spacing="4">MS</text>
    
    <!-- Pavillon du stéthoscope en bas -->
    <path d="M220 360 C220 395 292 395 292 360" fill="none" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round"/>
    
    <!-- Point d'impact / onde lumineuse verte -->
    <circle cx="256" cy="385" r="8" fill="#27C694"/>
  </g>
</svg>
