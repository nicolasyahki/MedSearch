# MedSearch — compile l'APK sur GitHub (Gradle, Java 21, SDK 36 — requis par Capacitor 8).
name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - 'vite.config.js'
      - '.github/workflows/build-apk.yml'

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: MedSearch APK (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Java 21 (requis Capacitor 8 / AGP 8.13)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Android SDK
        uses: android-actions/setup-android@v4

      - name: SDK platform 36 + build-tools
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platform-tools" "platforms;android-36"
          sdkmanager --install "build-tools;36.0.0" || sdkmanager --install "build-tools;35.0.0"

      - name: Install npm dependencies
        run: npm ci

      - name: Build web (Vite)
        run: npm run build

      - name: Sync Capacitor → android/
        run: npx cap sync android

      - name: Compile APK (Gradle)
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Verify APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          test -f "$APK" || (echo "APK introuvable" && exit 1)
          ls -lh "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MedSearch-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Résumé
        run: |
          echo "## MedSearch — APK prête" >> "$GITHUB_STEP_SUMMARY"
          echo "Téléchargez **MedSearch-debug-apk** (\`app-debug.apk\`)." >> "$GITHUB_STEP_SUMMARY"
